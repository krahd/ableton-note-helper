name: Generate social preview

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/generate-social-preview.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install SVG renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
      - name: Render social preview
        run: rsvg-convert --width 1280 --height 640 --output assets/social-preview.png assets/social-preview.svg
      - name: Point public metadata at the raster preview
        shell: python
        run: |
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text().replace('assets/social-preview.svg', 'assets/social-preview.png')
          index.write_text(text)

          readme = Path('README.md')
          text = readme.read_text().replace('assets/social-preview.svg)', 'assets/social-preview.png)')
          readme.write_text(text)

          launch = Path('docs/launch-kit.md')
          text = launch.read_text()
          old = '`assets/social-preview.svg` is a 1280 × 640 launch card and editable source. GitHub’s repository social-preview setting requires a raster image, so export this SVG to PNG before uploading it under **Settings → General → Social preview**.'
          new = '`assets/social-preview.png` is the ready-to-upload 1280 × 640 launch card. `assets/social-preview.svg` is its editable source.'
          if old not in text:
              raise SystemExit('Missing launch-kit preview text')
          launch.write_text(text.replace(old, new))

          tests = Path('tests.mjs')
          text = tests.read_text()
          marker = "assert.ok(existsSync(new URL('./assets/social-preview.svg', import.meta.url)));"
          addition = marker + "\nassert.ok(existsSync(new URL('./assets/social-preview.png', import.meta.url)));"
          if marker not in text:
              raise SystemExit('Missing preview assertion marker')
          tests.write_text(text.replace(marker, addition))
      - name: Run full test suite
        run: npm test
      - name: Commit generated launch asset
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/social-preview.png index.html README.md docs/launch-kit.md tests.mjs
          git commit -m "Add production social-preview image"
          git push
